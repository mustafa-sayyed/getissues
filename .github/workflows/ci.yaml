name: Run Typecheck and Build

on:
 push:
  branches:
    - main
 pull_request:
    branches:
      - main

jobs:
  ci:
   runs-on: ubuntu-24

   steps:
     - name: Checkout Repo
       uses: actions/checkout@v4
    
     - name: Setup pnpm
       uses: pnpm/action-setup@v4
       with:
         version: 10.22.0

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: 24
         cache: 'pnpm'


     - name: Install Dependencies
       run: pnpm install --frozen-lockfile

     - name: Run Typecheck
       run: pnpm run typecheck

     - name: Build
       run: pnpm run build

     